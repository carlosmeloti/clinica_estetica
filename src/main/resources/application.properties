spring.application.name=clinica
server.servlet.context-path=/api

# ==========================================
# Conexão Limpa com o Banco de Dados
# ==========================================
# Removemos o parâmetro da URL para testar a conexão pura na base certa
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_estetica
spring.datasource.username=app_clinica
spring.datasource.password=Clinica2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configuração do Hibernate / JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Força o Hibernate a usar o schema clinica
spring.jpa.properties.hibernate.default_schema=clinica
spring.jpa.properties.jakarta.persistence.schema=clinica

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================
# Configuração do Flyway (Ajustado)
# ==========================================
# Essa propriedade força o Flyway a alternar para o schema certo logo após conectar
spring.flyway.default-schema=clinica
spring.flyway.schemas=clinica
spring.flyway.create-schemas=false
spring.flyway.locations=classpath:db/migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

