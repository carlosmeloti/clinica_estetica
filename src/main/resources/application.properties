spring.application.name=clinica

server.servlet.context-path=/api

# Conexão com o Banco de Dados
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_estetica
spring.datasource.username=app_clinica
spring.datasource.password=Clinica2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuração do Hibernate e Schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=clinica

# Configuração do Flyway
spring.flyway.default-schema=clinica
spring.flyway.schemas=clinica
spring.flyway.create-schemas=false
spring.flyway.locations=classpath:db/migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

